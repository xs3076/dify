name: Build Dify Web (subpath)

on:
  workflow_dispatch:
    inputs:
      dify_version:
        description: "Dify tag to build"
        default: "1.14.1"
      base_path:
        description: "NEXT_PUBLIC_BASE_PATH"
        default: "/dify"

env:
  REGISTRY: registry.cn-shanghai.aliyuncs.com
  IMAGE_NAME: vagent/dify-web

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Dify at pinned tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.dify_version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: web/Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_BASE_PATH=${{ inputs.base_path }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.dify_version }}-subpath
          cache-from: type=gha
          cache-to: type=gha,mode=max
